cat > /home/claude/index.html << 'EOF'
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Chain Scanner</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=Exo+2:wght@300;400;700;900&display=swap');
  :root {
    --bg: #030a0f; --surface: #0a1520; --border: #0d2235;
    --accent: #00d4ff; --accent2: #ff6b35; --success: #00ff88;
    --warn: #ffcc00; --text: #c8e8f0; --muted: #4a7a8a;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { background: var(--bg); color: var(--text); font-family: 'Exo 2', sans-serif; min-height: 100vh; }
  .container { max-width: 900px; margin: 0 auto; padding: 2rem; }
  header { display:flex; align-items:center; gap:1rem; margin-bottom:2rem; border-bottom:1px solid var(--border); padding-bottom:1.5rem; }
  .logo { width:40px; height:40px; background:linear-gradient(135deg,var(--accent),var(--accent2)); clip-path:polygon(50% 0%,100% 25%,100% 75%,50% 100%,0% 75%,0% 25%); flex-shrink:0; }
  h1 { font-weight:900; font-size:1.5rem; letter-spacing:0.15em; text-transform:uppercase; color:var(--accent); }
  .subtitle { font-size:0.72rem; color:var(--muted); letter-spacing:0.1em; margin-top:2px; }
  .section { background:var(--surface); border:1px solid var(--border); border-radius:12px; padding:2rem; margin-bottom:1.5rem; }
  .connect-icon { font-size:2.5rem; margin-bottom:1rem; display:block; text-align:center; }
  .connect-title { font-size:1.1rem; font-weight:700; color:var(--text); margin-bottom:0.5rem; text-align:center; }
  .connect-sub { font-size:0.78rem; color:var(--muted); margin-bottom:1.5rem; line-height:1.6; text-align:center; }
  .btn { display:block; width:100%; background:linear-gradient(135deg,var(--accent),#0099cc); border:none; border-radius:8px; color:#000; cursor:pointer; font-family:'Exo 2',sans-serif; font-size:0.9rem; font-weight:800; letter-spacing:0.15em; padding:0.9rem; text-transform:uppercase; transition:all 0.2s; margin-bottom:0.75rem; text-align:center; text-decoration:none; }
  .btn:hover { opacity:0.85; }
  .btn-outline { background:transparent; border:1px solid var(--accent); color:var(--accent); }
  .debug { background:rgba(0,0,0,0.3); border:1px solid var(--border); border-radius:6px; padding:0.75rem; font-family:'Share Tech Mono',monospace; font-size:0.7rem; color:var(--muted); margin-top:1rem; line-height:1.8; }
  .wallet-pill { display:inline-flex; align-items:center; gap:0.5rem; background:rgba(0,255,136,0.08); border:1px solid rgba(0,255,136,0.3); border-radius:20px; padding:0.4rem 1rem; font-family:'Share Tech Mono',monospace; font-size:0.75rem; color:var(--success); margin-bottom:1rem; }
  .wallet-dot { width:7px; height:7px; background:var(--success); border-radius:50%; }
  .chains-grid { display:grid; grid-template-columns:repeat(auto-fill,minmax(240px,1fr)); gap:1rem; }
  .chain-card { background:var(--surface); border:1px solid var(--border); border-radius:10px; padding:1.25rem; }
  .chain-card.has-value { border-color:rgba(0,212,255,0.4); }
  .chain-top { display:flex; justify-content:space-between; align-items:center; margin-bottom:0.75rem; }
  .chain-name-row { display:flex; align-items:center; gap:0.5rem; }
  .chain-icon { width:28px; height:28px; border-radius:50%; display:flex; align-items:center; justify-content:center; font-size:0.85rem; }
  .chain-label { font-size:0.8rem; font-weight:700; }
  .chain-network { font-size:0.65rem; color:var(--muted); text-transform:uppercase; }
  .chain-bal { font-family:'Share Tech Mono',monospace; font-size:1rem; color:var(--text); }
  .chain-usd { font-size:0.8rem; color:var(--warn); }
  .chain-zero { color:var(--muted); font-size:0.85rem; }
  .summary { display:flex; justify-content:space-between; align-items:center; flex-wrap:wrap; gap:1rem; margin-bottom:1.5rem; }
  .summary-label { font-size:0.7rem; color:var(--muted); text-transform:uppercase; letter-spacing:0.1em; margin-bottom:0.2rem; }
  .summary-value { font-family:'Share Tech Mono',monospace; font-size:1.1rem; color:var(--success); font-weight:700; }
  .btn-row { display:flex; gap:0.5rem; }
  .btn-sm { padding:0.4rem 1rem; font-size:0.75rem; width:auto; display:inline-block; }
  .spinner { display:inline-block; width:12px; height:12px; border:2px solid var(--border); border-top-color:var(--accent); border-radius:50%; animation:spin 0.8s linear infinite; }
  @keyframes spin { to{transform:rotate(360deg)} }
</style>
</head>
<body>
<div class="container">
  <header>
    <div class="logo"></div>
    <div>
      <h1>Chain Scanner</h1>
      <div class="subtitle">Multi-chain wallet balance scanner</div>
    </div>
  </header>
  <div id="app"></div>
</div>
<script>
const CHAINS = [
  { id:'0x1',    name:'Ethereum', network:'Mainnet', symbol:'ETH', icon:'⟠', color:'#627eea', rpc:'https://ethereum.publicnode.com',      cgId:'ethereum' },
  { id:'0x38',   name:'BNB Chain',network:'BSC',     symbol:'BNB', icon:'⬡', color:'#f0b90b', rpc:'https://bsc.publicnode.com',           cgId:'binancecoin' },
  { id:'0x89',   name:'Polygon',  network:'Mainnet', symbol:'POL', icon:'⬟', color:'#8247e5', rpc:'https://polygon.publicnode.com',       cgId:'matic-network' },
  { id:'0xa4b1', name:'Arbitrum', network:'One',     symbol:'ETH', icon:'◈', color:'#12aaff', rpc:'https://arbitrum-one.publicnode.com',  cgId:'ethereum' },
  { id:'0xa',    name:'Optimism', network:'Mainnet', symbol:'ETH', icon:'○', color:'#ff0420', rpc:'https://optimism.publicnode.com',      cgId:'ethereum' },
  { id:'0x2105', name:'Base',     network:'Mainnet', symbol:'ETH', icon:'⬡', color:'#0052ff', rpc:'https://base.publicnode.com',          cgId:'ethereum' },
];

let address = null;
let prices = {};
let balances = {};
const app = document.getElementById('app');

function detectEnv() {
  const ua = navigator.userAgent;
  const hasEthereum = typeof window.ethereum !== 'undefined';
  const isMetaMaskUA = ua.includes('MetaMaskMobile') || ua.includes('MetaMask');
  return { hasEthereum, isMetaMaskUA, ua };
}

function render() {
  if (!address) renderConnect();
  else renderDashboard();
}

function renderConnect() {
  const env = detectEnv();
  const debugInfo = `ethereum: ${env.hasEthereum} | MM UA: ${env.isMetaMaskUA}`;
  
  let content = '';
  
  if (env.hasEthereum) {
    // MetaMask is available
    content = `
      <span class="connect-icon">🦊</span>
      <div class="connect-title">MetaMask Detected</div>
      <div class="connect-sub">Connect your wallet to scan balances across 6 chains.<br><strong style="color:var(--accent)">Read-only. No private keys.</strong></div>
      <button class="btn" onclick="connectWallet()">🔗 Connect Wallet</button>`;
  } else {
    // No ethereum - show options
    const currentUrl = window.location.href;
    const mmDeepLink = `https://metamask.app.link/dapp/${window.location.host}${window.location.pathname}`;
    content = `
      <span class="connect-icon">🔗</span>
      <div class="connect-title">Open in MetaMask Browser</div>
      <div class="connect-sub">To connect your wallet, open this page inside the MetaMask app browser.</div>
      <a href="${mmDeepLink}" class="btn">🦊 Open in MetaMask</a>
      <div style="text-align:center;font-size:0.7rem;color:var(--muted);margin:0.5rem 0">— or manually open in MetaMask browser —</div>
      <div style="background:var(--bg);border:1px solid var(--border);border-radius:6px;padding:0.75rem;font-family:'Share Tech Mono',monospace;font-size:0.75rem;color:var(--accent);text-align:center;word-break:break-all;margin-bottom:1rem">${window.location.host}${window.location.pathname}</div>
      <button class="btn btn-outline" onclick="manualEntry()">✏️ Enter Address Manually</button>`;
  }
  
  app.innerHTML = `
    <div class="section">
      ${content}
      <div class="debug">${debugInfo}</div>
    </div>`;
}

function manualEntry() {
  const addr = prompt('Enter your wallet address (0x...):');
  if (addr && addr.startsWith('0x') && addr.length === 42) {
    address = addr.toLowerCase();
    render();
    loadAll();
  } else if (addr) {
    alert('Invalid address. Must start with 0x and be 42 characters.');
  }
}

async function connectWallet() {
  try {
    const accounts = await window.ethereum.request({ method: 'eth_requestAccounts' });
    address = accounts[0];
    render();
    await loadAll();
  } catch(err) {
    alert('Connection failed: ' + (err.message || 'rejected'));
  }
}

function renderDashboard() {
  const short = address.slice(0,6) + '...' + address.slice(-4);
  let totalUsd = 0;
  Object.values(balances).forEach(b => { if (b?.usd) totalUsd += b.usd; });
  
  app.innerHTML = `
    <div class="summary">
      <div>
        <div class="summary-label">Wallet</div>
        <div class="wallet-pill"><span class="wallet-dot"></span>${short}</div>
      </div>
      <div>
        <div class="summary-label">Total</div>
        <div class="summary-value" id="grandTotal">${totalUsd > 0 ? '$'+totalUsd.toFixed(2) : 'Scanning...'}</div>
      </div>
      <div class="btn-row">
        <button class="btn btn-outline btn-sm" onclick="loadAll()">↻ Rescan</button>
        <button class="btn btn-sm" style="background:transparent;border:1px solid rgba(255,100,100,0.3);color:rgba(255,100,100,0.7);width:auto" onclick="disconnect()">Disconnect</button>
      </div>
    </div>
    <div class="chains-grid" id="chainsGrid">
      ${CHAINS.map(c => `
        <div class="chain-card" id="card_${c.id.replace('0x','')}">
          <div class="chain-top">
            <div class="chain-name-row">
              <div class="chain-icon" style="background:${c.color}22;color:${c.color}">${c.icon}</div>
              <div><div class="chain-label" style="color:${c.color}">${c.name}</div><div class="chain-network">${c.network}</div></div>
            </div>
            <span class="spinner"></span>
          </div>
          <div class="chain-zero">loading...</div>
        </div>`).join('')}
    </div>`;
}

async function loadAll() {
  if (!address) return;
  balances = {};
  renderDashboard();
  try {
    const res = await fetch('https://api.coingecko.com/api/v3/simple/price?ids=ethereum,binancecoin,matic-network&vs_currencies=usd');
    const data = await res.json();
    prices = { ethereum: data.ethereum?.usd||2020, binancecoin: data.binancecoin?.usd||600, 'matic-network': data['matic-network']?.usd||0.5 };
  } catch { prices = { ethereum:2020, binancecoin:600, 'matic-network':0.5 }; }
  
  await Promise.all(CHAINS.map(c => scanChain(c)));
  
  let total = 0;
  Object.values(balances).forEach(b => { if (b?.usd) total += b.usd; });
  const el = document.getElementById('grandTotal');
  if (el) el.textContent = '$' + total.toFixed(2);
}

async function scanChain(chain) {
  const cardId = chain.id.replace('0x','');
  const card = document.getElementById('card_' + cardId);
  try {
    const res = await fetch(chain.rpc, {
      method:'POST',
      headers:{'Content-Type':'application/json'},
      body: JSON.stringify({ jsonrpc:'2.0', method:'eth_getBalance', params:[address,'latest'], id:1 })
    });
    const data = await res.json();
    if (data.error) throw new Error(data.error.message);
    const bal = parseInt(data.result, 16) / 1e18;
    const usd = bal * (prices[chain.cgId] || 0);
    balances[chain.id] = { bal, usd };
    if (card) {
      if (usd > 0.01) card.classList.add('has-value');
      const balStr = bal < 0.000001 ? '0' : bal.toFixed(6);
      card.innerHTML = `
        <div class="chain-top">
          <div class="chain-name-row">
            <div class="chain-icon" style="background:${chain.color}22;color:${chain.color}">${chain.icon}</div>
            <div><div class="chain-label" style="color:${chain.color}">${chain.name}</div><div class="chain-network">${chain.network}</div></div>
          </div>
          <span style="font-size:0.65rem;color:var(--success)">✓</span>
        </div>
        ${bal > 0.000001
          ? `<div class="chain-bal">${balStr} ${chain.symbol}</div><div class="chain-usd">$${usd.toFixed(2)}</div>`
          : `<div class="chain-zero">0 ${chain.symbol}</div>`}`;
    }
    let total = 0;
    Object.values(balances).forEach(b => { if (b?.usd) total += b.usd; });
    const totalEl = document.getElementById('grandTotal');
    if (totalEl) totalEl.textContent = '$' + total.toFixed(2);
  } catch(e) {
    if (card) card.innerHTML = `
      <div class="chain-top">
        <div class="chain-name-row">
          <div class="chain-icon" style="background:${chain.color}22;color:${chain.color}">${chain.icon}</div>
          <div><div class="chain-label" style="color:${chain.color}">${chain.name}</div><div class="chain-network">${chain.network}</div></div>
        </div>
      </div>
      <div style="font-size:0.7rem;color:#ff4444">RPC error</div>`;
  }
}

function disconnect() { address = null; balances = {}; render(); }

if (typeof window.ethereum !== 'undefined') {
  window.ethereum.on('accountsChanged', accounts => {
    if (!accounts.length) disconnect();
    else { address = accounts[0]; render(); loadAll(); }
  });
}

render();
</script>
</body>
</html>
EOF
echo "done"

<!DOCTYPE html>

<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>Chain Scanner Pro</title>
<link href="https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=Orbitron:wght@400;700;900&family=Rajdhani:wght@300;400;600;700&display=swap" rel="stylesheet">
<style>
  :root{--bg:#020810;--surface:#060f1a;--surface2:#091520;--border:#0d2235;--border2:#0a3050;--accent:#00d4ff;--accent2:#ff6b35;--accent3:#00ff88;--warn:#ffcc00;--text:#c8e8f0;--muted:#3a6a7a;--muted2:#2a4a5a;}
  *{box-sizing:border-box;margin:0;padding:0;}
  html,body{min-height:100vh;background:var(--bg);color:var(--text);font-family:'Rajdhani',sans-serif;overflow-x:hidden;}
  body::before{content:'';position:fixed;inset:0;pointer-events:none;z-index:0;background-image:linear-gradient(rgba(0,212,255,0.02) 1px,transparent 1px),linear-gradient(90deg,rgba(0,212,255,0.02) 1px,transparent 1px);background-size:40px 40px;}
  .container{max-width:980px;margin:0 auto;padding:1.5rem 1rem;position:relative;z-index:1;}
  header{display:flex;align-items:center;gap:1rem;margin-bottom:1.5rem;padding-bottom:1.25rem;border-bottom:1px solid var(--border);position:relative;}
  header::after{content:'';position:absolute;bottom:-1px;left:0;width:140px;height:1px;background:linear-gradient(90deg,var(--accent),transparent);}
  .logo-hex{width:44px;height:44px;background:linear-gradient(135deg,var(--accent),var(--accent2));clip-path:polygon(50% 0%,100% 25%,100% 75%,50% 100%,0% 75%,0% 25%);animation:hexPulse 3s ease-in-out infinite;flex-shrink:0;}
  @keyframes hexPulse{0%,100%{filter:drop-shadow(0 0 6px rgba(0,212,255,0.4))}50%{filter:drop-shadow(0 0 14px rgba(0,212,255,0.8))}}
  h1{font-family:'Orbitron',monospace;font-size:clamp(1rem,4vw,1.35rem);font-weight:900;letter-spacing:.2em;color:var(--accent);text-shadow:0 0 20px rgba(0,212,255,0.4);}
  .sub{font-size:.7rem;color:var(--muted);letter-spacing:.1em;text-transform:uppercase;margin-top:2px;}
  .hbadge{margin-left:auto;font-family:'Share Tech Mono',monospace;font-size:.58rem;color:var(--accent3);border:1px solid rgba(0,255,136,0.2);background:rgba(0,255,136,0.05);padding:.25rem .6rem;border-radius:3px;white-space:nowrap;}

/* WALLET GRID */
.wallet-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(140px,1fr));gap:.75rem;margin-bottom:1.25rem;}
.wallet-btn{background:var(–surface2);border:1px solid var(–border2);border-radius:10px;padding:.9rem .75rem;cursor:pointer;transition:all .2s;display:flex;flex-direction:column;align-items:center;gap:.5rem;text-align:center;}
.wallet-btn:hover{border-color:var(–accent);background:rgba(0,212,255,0.06);transform:translateY(-2px);}
.wallet-btn:active{transform:translateY(0);}
.wallet-emoji{font-size:1.75rem;line-height:1;}
.wallet-name{font-family:‘Orbitron’,monospace;font-size:.6rem;font-weight:700;letter-spacing:.08em;color:var(–text);text-transform:uppercase;}
.wallet-type{font-size:.58rem;color:var(–muted);margin-top:1px;}
.wallet-btn.detected{border-color:rgba(0,255,136,0.4);background:rgba(0,255,136,0.05);}
.wallet-btn.detected .wallet-name{color:var(–accent3);}

.connect-title{font-family:‘Orbitron’,monospace;font-size:1rem;font-weight:700;color:var(–text);margin-bottom:.4rem;text-align:center;}
.connect-sub{font-size:.8rem;color:var(–muted);line-height:1.6;margin-bottom:1.25rem;text-align:center;}
.connect-sub strong{color:var(–accent);}

.tabs{display:flex;gap:.5rem;margin-bottom:1.25rem;flex-wrap:wrap;}
.tab{padding:.45rem 1rem;border-radius:6px;font-family:‘Orbitron’,monospace;font-size:.6rem;font-weight:700;letter-spacing:.1em;cursor:pointer;border:1px solid var(–border2);background:transparent;color:var(–muted);transition:all .2s;text-transform:uppercase;}
.tab.active{background:rgba(0,212,255,0.1);border-color:var(–accent);color:var(–accent);}
.card{background:var(–surface);border:1px solid var(–border);border-radius:12px;padding:1.5rem;margin-bottom:1rem;position:relative;overflow:hidden;}
.card::before{content:’’;position:absolute;top:0;left:0;right:0;height:1px;background:linear-gradient(90deg,transparent,var(–accent),transparent);opacity:.2;}

.btn{display:block;width:100%;padding:.85rem 1.5rem;border:none;border-radius:8px;font-family:‘Orbitron’,monospace;font-size:.72rem;font-weight:700;letter-spacing:.12em;text-transform:uppercase;cursor:pointer;transition:all .2s;margin-bottom:.75rem;text-align:center;text-decoration:none;}
.btn-primary{background:linear-gradient(135deg,#0088aa,var(–accent));color:#000;}
.btn-outline{background:transparent;border:1px solid var(–accent);color:var(–accent);}
.btn-outline:hover{background:rgba(0,212,255,0.08);}
.btn-ghost{background:transparent;border:1px solid rgba(255,100,100,0.25);color:rgba(255,130,130,0.6);font-size:.62rem;}
.btn-sm{padding:.4rem .9rem;font-size:.58rem;width:auto;display:inline-block;margin-bottom:0;}
.btn-row{display:flex;gap:.5rem;align-items:center;flex-wrap:wrap;}

.summary-bar{display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:1rem;margin-bottom:1.25rem;}
.summary-label{font-size:.62rem;color:var(–muted);text-transform:uppercase;letter-spacing:.1em;margin-bottom:.2rem;}
.wallet-pill{display:inline-flex;align-items:center;gap:.5rem;background:rgba(0,255,136,0.06);border:1px solid rgba(0,255,136,0.2);border-radius:20px;padding:.35rem .85rem;font-family:‘Share Tech Mono’,monospace;font-size:.72rem;color:var(–accent3);}
.wdot{width:6px;height:6px;background:var(–accent3);border-radius:50%;animation:blink 1.5s ease-in-out infinite;}
@keyframes blink{0%,100%{opacity:1}50%{opacity:.3}}
.total-value{font-family:‘Orbitron’,monospace;font-size:1.3rem;font-weight:700;color:var(–accent3);text-shadow:0 0 12px rgba(0,255,136,0.3);}

.chain-header{display:flex;align-items:center;gap:.75rem;margin-bottom:1rem;padding-bottom:.75rem;border-bottom:1px solid var(–border);}
.chain-icon-lg{width:36px;height:36px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:1.1rem;flex-shrink:0;}
.chain-title{font-family:‘Orbitron’,monospace;font-size:.85rem;font-weight:700;}
.chain-net{font-size:.6rem;color:var(–muted);text-transform:uppercase;}
.chain-native{font-family:‘Share Tech Mono’,monospace;font-size:.9rem;margin-left:auto;text-align:right;}
.chain-usd-sm{font-size:.72rem;color:var(–warn);}

.token-list{width:100%;border-collapse:collapse;}
.token-list th{font-size:.58rem;color:var(–muted);text-transform:uppercase;letter-spacing:.1em;padding:.4rem .5rem;text-align:left;border-bottom:1px solid var(–border);font-family:‘Share Tech Mono’,monospace;}
.token-list td{padding:.5rem;font-size:.78rem;border-bottom:1px solid rgba(13,34,53,.5);vertical-align:middle;}
.token-list tr:last-child td{border-bottom:none;}
.token-list tr:hover td{background:rgba(0,212,255,0.03);}
.token-name{font-weight:700;color:var(–text);}
.token-sym{font-size:.65rem;color:var(–muted);font-family:‘Share Tech Mono’,monospace;}
.token-bal{font-family:‘Share Tech Mono’,monospace;font-size:.75rem;}
.token-val{font-family:‘Share Tech Mono’,monospace;color:var(–warn);font-size:.75rem;}
.token-val.high{color:var(–accent3);}
.token-contract{font-family:‘Share Tech Mono’,monospace;font-size:.58rem;color:var(–muted);cursor:pointer;}
.value-badge{display:inline-block;padding:.15rem .4rem;border-radius:3px;font-size:.55rem;font-weight:700;}
.badge-high{background:rgba(0,255,136,0.12);color:var(–accent3);border:1px solid rgba(0,255,136,0.2);}
.badge-med{background:rgba(255,204,0,0.1);color:var(–warn);border:1px solid rgba(255,204,0,0.2);}
.badge-low{background:rgba(58,106,122,0.2);color:var(–muted);border:1px solid var(–border);}

.nft-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(110px,1fr));gap:.75rem;margin-top:.75rem;}
.nft-card{background:var(–surface2);border:1px solid var(–border);border-radius:8px;padding:.75rem;text-align:center;}
.nft-icon{font-size:1.5rem;margin-bottom:.4rem;}
.nft-name{font-size:.68rem;font-weight:700;color:var(–text);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.nft-id{font-family:‘Share Tech Mono’,monospace;font-size:.58rem;color:var(–muted);}

.tx-row{display:flex;align-items:center;gap:.75rem;padding:.6rem 0;border-bottom:1px solid rgba(13,34,53,.5);}
.tx-row:last-child{border-bottom:none;}
.tx-icon{width:28px;height:28px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:.75rem;flex-shrink:0;}
.tx-in{background:rgba(0,255,136,0.1);color:var(–accent3);}
.tx-out{background:rgba(255,107,53,0.1);color:var(–accent2);}
.tx-call{background:rgba(0,212,255,0.1);color:var(–accent);}
.tx-exec{background:rgba(130,71,229,0.15);color:#a78bfa;}
.tx-fail{background:rgba(255,50,50,0.12);color:#ff6b6b;}
.tx-info{flex:1;min-width:0;}
.tx-hash{font-family:‘Share Tech Mono’,monospace;font-size:.62rem;color:var(–accent);cursor:pointer;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.tx-desc{font-size:.7rem;color:var(–muted);margin-top:1px;}
.tx-val{font-family:‘Share Tech Mono’,monospace;font-size:.72rem;text-align:right;white-space:nowrap;}
.tx-time{font-size:.58rem;color:var(–muted2);}
.tx-method{font-family:‘Share Tech Mono’,monospace;font-size:.58rem;background:rgba(0,212,255,0.08);border:1px solid rgba(0,212,255,0.15);border-radius:3px;padding:.1rem .35rem;color:var(–accent);margin-top:2px;display:inline-block;}
.tx-method.fail{background:rgba(255,50,50,0.08);border-color:rgba(255,50,50,0.2);color:#ff6b6b;}
.tx-method.exec{background:rgba(130,71,229,0.08);border-color:rgba(130,71,229,0.2);color:#a78bfa;}
.activity-section{margin-bottom:1rem;}
.activity-header{display:flex;align-items:center;gap:.5rem;font-family:‘Orbitron’,monospace;font-size:.6rem;font-weight:700;letter-spacing:.12em;color:var(–muted);text-transform:uppercase;padding:.5rem 0;border-bottom:1px solid var(–border);margin-bottom:.5rem;}
.activity-count{background:rgba(0,212,255,0.1);border:1px solid rgba(0,212,255,0.2);border-radius:10px;padding:.1rem .45rem;font-size:.58rem;color:var(–accent);}
.activity-count.fail{background:rgba(255,50,50,0.1);border-color:rgba(255,50,50,0.2);color:#ff6b6b;}
.activity-count.exec{background:rgba(130,71,229,0.1);border-color:rgba(130,71,229,0.2);color:#a78bfa;}
.gas-info{font-size:.58rem;color:var(–muted2);font-family:‘Share Tech Mono’,monospace;}

.divider{display:flex;align-items:center;gap:.75rem;margin:.75rem 0;font-size:.62rem;color:var(–muted);text-transform:uppercase;letter-spacing:.1em;}
.divider::before,.divider::after{content:’’;flex:1;height:1px;background:var(–border);}
.deeplink-box{background:var(–bg);border:1px solid var(–border2);border-radius:6px;padding:.75rem;font-family:‘Share Tech Mono’,monospace;font-size:.72rem;color:var(–accent);text-align:center;word-break:break-all;margin-bottom:1rem;cursor:pointer;}
.debug-bar{background:rgba(0,0,0,0.4);border:1px solid var(–border);border-radius:6px;padding:.5rem .75rem;font-family:‘Share Tech Mono’,monospace;font-size:.6rem;color:var(–muted2);margin-top:1rem;}
.spin{display:inline-block;width:12px;height:12px;border:2px solid var(–border2);border-top-color:var(–accent);border-radius:50%;animation:spin .7s linear infinite;}
@keyframes spin{to{transform:rotate(360deg)}}
.loading-text{font-size:.75rem;color:var(–muted);font-family:‘Share Tech Mono’,monospace;}
.empty-state{text-align:center;padding:1.5rem;color:var(–muted);font-size:.78rem;}
.section-title{font-family:‘Orbitron’,monospace;font-size:.65rem;font-weight:700;letter-spacing:.15em;color:var(–muted);text-transform:uppercase;margin:1rem 0 .5rem;}
.total-row{display:flex;justify-content:space-between;align-items:center;padding:.5rem 0;border-top:1px solid var(–border);margin-top:.5rem;}
.total-row-label{font-size:.72rem;color:var(–muted);text-transform:uppercase;}
.total-row-val{font-family:‘Orbitron’,monospace;font-size:.9rem;color:var(–accent3);}
.copy-btn{font-size:.55rem;padding:.1rem .35rem;background:rgba(0,212,255,0.08);border:1px solid rgba(0,212,255,0.2);border-radius:3px;cursor:pointer;color:var(–accent);margin-left:.35rem;}

/* WalletConnect modal */
.wc-modal{position:fixed;inset:0;background:rgba(0,0,0,0.8);z-index:100;display:flex;align-items:center;justify-content:center;padding:1rem;}
.wc-box{background:var(–surface);border:1px solid var(–border2);border-radius:16px;padding:1.5rem;max-width:360px;width:100%;}
.wc-title{font-family:‘Orbitron’,monospace;font-size:.85rem;font-weight:700;color:var(–accent);margin-bottom:.5rem;text-align:center;}
.wc-sub{font-size:.75rem;color:var(–muted);text-align:center;margin-bottom:1rem;line-height:1.6;}
.wc-close{float:right;background:transparent;border:none;color:var(–muted);font-size:1.2rem;cursor:pointer;margin-top:-0.25rem;}

/* ACCOUNT PICKER */
.acc-list{display:flex;flex-direction:column;gap:.5rem;}
.acc-row{display:flex;align-items:center;gap:.75rem;padding:.75rem;background:var(–surface2);border:1px solid var(–border2);border-radius:8px;cursor:pointer;transition:all .2s;}
.acc-row:hover{border-color:var(–accent);background:rgba(0,212,255,0.04);}
.acc-check{width:22px;height:22px;border-radius:5px;border:1px solid var(–border2);display:flex;align-items:center;justify-content:center;font-size:.7rem;color:transparent;flex-shrink:0;transition:all .2s;}
.acc-check.checked{background:rgba(0,255,136,0.15);border-color:var(–accent3);color:var(–accent3);}
.acc-name{font-family:‘Orbitron’,monospace;font-size:.62rem;font-weight:700;color:var(–text);}
.acc-addr{font-family:‘Share Tech Mono’,monospace;font-size:.65rem;color:var(–muted);margin-top:2px;}

@media(max-width:480px){.card{padding:1rem}.nft-grid{grid-template-columns:repeat(3,1fr)}.wallet-grid{grid-template-columns:repeat(3,1fr)}}
</style>

</head>
<body>
<div class="container">
  <header>
    <div class="logo-hex"></div>
    <div><h1>Chain Scanner Pro</h1><div class="sub">Tokens · NFTs · History · Contracts · Activity</div></div>
    <div class="hbadge">6 CHAINS</div>
  </header>
  <div id="app"></div>
</div>

<script>
const KEY='5897WQKUFEX73XGC2FJZG3HGNUEKP1KJI1';
const CHAINS=[
  {id:'eth',name:'Ethereum',net:'Mainnet',sym:'ETH',icon:'⟠',color:'#627eea',rpc:'https://ethereum.publicnode.com',cg:'ethereum',explorer:'https://api.etherscan.io/api',explorerUrl:'https://etherscan.io'},
  {id:'bsc',name:'BNB Chain',net:'BSC',sym:'BNB',icon:'⬡',color:'#f0b90b',rpc:'https://bsc.publicnode.com',cg:'binancecoin',explorer:'https://api.bscscan.com/api',explorerUrl:'https://bscscan.com'},
  {id:'poly',name:'Polygon',net:'Mainnet',sym:'POL',icon:'⬟',color:'#8247e5',rpc:'https://polygon.publicnode.com',cg:'matic-network',explorer:'https://api.polygonscan.com/api',explorerUrl:'https://polygonscan.com'},
  {id:'arb',name:'Arbitrum',net:'One',sym:'ETH',icon:'◈',color:'#12aaff',rpc:'https://arbitrum-one.publicnode.com',cg:'ethereum',explorer:'https://api.arbiscan.io/api',explorerUrl:'https://arbiscan.io'},
  {id:'op',name:'Optimism',net:'Mainnet',sym:'ETH',icon:'○',color:'#ff0420',rpc:'https://optimism.publicnode.com',cg:'ethereum',explorer:'https://api-optimistic.etherscan.io/api',explorerUrl:'https://optimistic.etherscan.io'},
  {id:'base',name:'Base',net:'Mainnet',sym:'ETH',icon:'⬡',color:'#0052ff',rpc:'https://base.publicnode.com',cg:'ethereum',explorer:'https://api.basescan.org/api',explorerUrl:'https://basescan.org'},
];

// Wallet definitions with deep links
const WALLETS=[
  {id:'metamask',  name:'MetaMask',  emoji:'🦊', type:'EVM',    deeplink:'https://metamask.app.link/dapp/',    detect:()=>window.ethereum?.isMetaMask},
  {id:'trust',     name:'Trust',     emoji:'🛡️', type:'Multi',  deeplink:'https://link.trustwallet.com/open_url?coin_id=60&url=', detect:()=>window.ethereum?.isTrust||window.ethereum?.isTrustWallet},
  {id:'rabby',     name:'Rabby',     emoji:'🐰', type:'EVM',    deeplink:null, detect:()=>window.ethereum?.isRabby},
  {id:'zerion',    name:'Zerion',    emoji:'⚡', type:'EVM',    deeplink:'https://app.zerion.io/',             detect:()=>window.ethereum?.isZerion},
  {id:'okx',       name:'OKX',       emoji:'⭕', type:'Multi',  deeplink:'okx://main/dapp/url?dappUrl=',       detect:()=>window.ethereum?.isOKExWallet||window.okxwallet},
  {id:'imtoken',   name:'imToken',   emoji:'💎', type:'EVM',    deeplink:'imtokenv2://navigate/DappView?url=', detect:()=>window.ethereum?.isImToken},
  {id:'fox',       name:'Fox Wallet',emoji:'🦊', type:'Multi',  deeplink:null, detect:()=>window.ethereum?.isFoxWallet},
  {id:'phantom',   name:'Phantom',   emoji:'👻', type:'SOL/EVM',deeplink:'https://phantom.app/ul/browse/',     detect:()=>window.solana?.isPhantom||window.phantom||window.ethereum?.isPhantom},
  {id:'manual',    name:'Manual',    emoji:'✏️', type:'Any',    deeplink:null, detect:()=>true},
];

let address=null, accounts=[], selectedAccounts=[], prices={}, portfolio={}, activeTab='tokens';
const app=document.getElementById('app');

// ── DETECT ──
function detectWallet(){
  // Check ethereum provider hints
  if(typeof window.ethereum==='undefined') return null;
  const e=window.ethereum;
  if(e.isRabby) return 'rabby';
  if(e.isZerion) return 'zerion';
  if(e.isOKExWallet||window.okxwallet) return 'okx';
  if(e.isImToken) return 'imtoken';
  if(e.isTrust||e.isTrustWallet) return 'trust';
  if(e.isFoxWallet) return 'fox';
  if(e.isPhantom) return 'phantom';
  if(e.isMetaMask) return 'metamask';
  return 'unknown'; // some wallet we don't know but has ethereum
}

function hasEVM(){ return typeof window.ethereum !== 'undefined'; }
function hasPhantom(){ return !!(window.solana?.isPhantom||window.phantom?.solana); }

// ── RENDER ──
function render(){ address ? renderDash() : renderConnect(); }

// ── CONNECT SCREEN ──
function renderConnect(){
  const detected = detectWallet();
  const url = encodeURIComponent(window.location.href);
  const host = window.location.host + window.location.pathname;

  const walletCards = WALLETS.map(w => {
    const isDetected = w.id !== 'manual' && w.detect && w.detect();
    const detectedClass = isDetected ? 'detected' : '';
    const badge = isDetected ? '<div class="wallet-type" style="color:var(--accent3)">● detected</div>' : `<div class="wallet-type">${w.type}</div>`;
    return `<div class="wallet-btn ${detectedClass}" onclick="handleWalletClick('${w.id}')">
      <div class="wallet-emoji">${w.emoji}</div>
      <div class="wallet-name">${w.name}</div>
      ${badge}
    </div>`;
  }).join('');

  app.innerHTML=`<div class="card">
    <div class="connect-title">Select Your Wallet</div>
    <div class="connect-sub">Connect to scan your <strong>full portfolio</strong> across 6 chains — tokens, NFTs, history, contracts.</div>
    <div class="wallet-grid">${walletCards}</div>
    <div class="debug-bar">
      ethereum: <span style="color:var(--muted)">${hasEVM()}</span> &nbsp;|&nbsp;
      detected: <span style="color:var(--muted)">${detected||'none'}</span> &nbsp;|&nbsp;
      phantom: <span style="color:var(--muted)">${hasPhantom()}</span>
    </div>
  </div>`;
}

async function handleWalletClick(id){
  const url = encodeURIComponent(window.location.href);
  const host = window.location.host + window.location.pathname;

  // Manual entry — always works
  if(id==='manual'){ manualEntry(); return; }

  // Phantom — Solana wallet, use its provider
  if(id==='phantom'){
    if(window.solana?.isPhantom||window.phantom?.solana){
      try{
        const sol = window.solana||window.phantom.solana;
        const resp = await sol.connect();
        // Phantom on EVM? try ethereum first
        if(hasEVM()){ await connectEVM(); return; }
        // Solana address — show it but note EVM chains won't scan
        address = resp.publicKey.toString();
        alert('Phantom Solana connected: '+address+'\n\nNote: This scanner covers EVM chains. Solana balances not yet supported. Use manual entry with an EVM address for full scan.');
        render(); return;
      }catch(e){ alert('Phantom connect failed: '+(e.message||'rejected')); return; }
    }
    // Not installed — deep link
    window.open('https://phantom.app/ul/browse/'+url,'_blank');
    showDeepLinkModal('Phantom','https://phantom.app/ul/browse/'+url, host);
    return;
  }

  // OKX wallet
  if(id==='okx'){
    if(window.okxwallet){
      try{ const a=await window.okxwallet.request({method:'eth_requestAccounts'}); address=a[0].toLowerCase(); render(); loadAll(); return; }
      catch(e){ alert('OKX connect failed'); return; }
    }
    if(hasEVM()){ await connectEVM(); return; }
    showDeepLinkModal('OKX Wallet','okx://main/dapp/url?dappUrl='+url, host);
    return;
  }

  // All other EVM wallets
  if(hasEVM()){ await connectEVM(); return; }

  // Not installed — show deep link for wallet
  const w = WALLETS.find(x=>x.id===id);
  if(w?.deeplink){
    const link = w.deeplink + (w.deeplink.endsWith('=') ? url : '');
    showDeepLinkModal(w.name, link, host);
  } else {
    showDeepLinkModal(w?.name||id, null, host);
  }
}

function showDeepLinkModal(name, link, host){
  const modal = document.createElement('div');
  modal.className = 'wc-modal';
  modal.innerHTML=`<div class="wc-box">
    <button class="wc-close" onclick="this.closest('.wc-modal').remove()">✕</button>
    <div class="wc-title">${name} Not Detected</div>
    <div class="wc-sub">${name} isn't installed or you're not in its browser.<br>Open this page inside the ${name} app browser.</div>
    ${link?`<a href="${link}" class="btn btn-primary" style="margin-top:.5rem">Open in ${name}</a>`:''}
    <div class="divider">or copy URL manually</div>
    <div class="deeplink-box" onclick="copyTxt('${window.location.href}');this.textContent='✓ Copied!'">${host}</div>
    <button class="btn btn-outline" onclick="this.closest('.wc-modal').remove();manualEntry()">✏️ Enter Address Instead</button>
  </div>`;
  document.body.appendChild(modal);
}

async function connectEVM(){
  try{
    const a = await window.ethereum.request({method:'eth_requestAccounts'});
    const all = await window.ethereum.request({method:'eth_accounts'});
    accounts = (all||a).map(x=>x.toLowerCase());
    if(accounts.length===1){
      selectedAccounts=[accounts[0]]; address=accounts[0]; render(); loadAll();
    } else {
      showAccountPicker();
    }
  }catch(e){ alert('Connection failed: '+(e.message||'rejected')); }
}

function showAccountPicker(){
  const rows = accounts.map((acc,i)=>`
    <label class="acc-row" onclick="toggleAcc('${acc}')">
      <div class="acc-check ${selectedAccounts.includes(acc)?'checked':''}" id="chk-${acc.slice(2,8)}">✓</div>
      <div class="acc-info">
        <div class="acc-name">Account ${i+1}</div>
        <div class="acc-addr">${acc.slice(0,10)}…${acc.slice(-6)}</div>
      </div>
    </label>`).join('');

  app.innerHTML=`<div class="card">
    <div class="connect-title" style="margin-bottom:.75rem">Select Accounts to Scan</div>
    <div class="connect-sub" style="margin-bottom:1rem">${accounts.length} accounts found · select one or more</div>
    <div class="acc-list">${rows}</div>
    <div style="display:flex;gap:.5rem;margin-top:1rem">
      <button class="btn btn-outline btn-sm" style="flex:1" onclick="selectAllAccounts()">Select All</button>
      <button class="btn btn-primary btn-sm" style="flex:1;color:#000" onclick="confirmAccounts()">Scan Selected ▶</button>
    </div>
    <button class="btn btn-ghost btn-sm" style="margin-top:.5rem;width:100%" onclick="render()">← Back</button>
  </div>`;
}

function toggleAcc(acc){
  if(selectedAccounts.includes(acc)) selectedAccounts=selectedAccounts.filter(a=>a!==acc);
  else selectedAccounts.push(acc);
  showAccountPicker();
}

function selectAllAccounts(){
  selectedAccounts=[...accounts];
  showAccountPicker();
}

function confirmAccounts(){
  if(!selectedAccounts.length){ alert('Select at least one account'); return; }
  address=selectedAccounts[0];
  render(); loadAll();
}

function manualEntry(){
  const a=prompt('Enter any EVM wallet address (0x...):');
  if(!a)return;
  const c=a.trim();
  if(/^0x[0-9a-fA-F]{40}$/.test(c)){
    address=c.toLowerCase(); accounts=[address]; selectedAccounts=[address]; render(); loadAll();
  } else alert('Invalid EVM address. Must start with 0x followed by 40 characters.');
}

function copyTxt(t){ navigator.clipboard?.writeText(t).catch(()=>{}); }
function disconnect(){ address=null; accounts=[]; selectedAccounts=[]; portfolio={}; render(); }

function renderTokensTab(){
  return CHAINS.map(c=>{
    // aggregate across all selected accounts for this chain
    let totalNativeBal=0, totalNativeUsd=0, allTokens=[], loading=false;
    selectedAccounts.forEach(acc=>{

      if(!p){loading=true;return;}
      totalNativeBal+=p.nativeBal||0;
      totalNativeUsd+=p.nativeUsd||0;
      (p.tokens||[]).forEach(t=>{
        const existing=allTokens.find(x=>x.contractAddress?.toLowerCase()===t.contractAddress?.toLowerCase());
        if(existing){

      });
    });

    return`<div class="card">
      <div class="chain-header">

        <div class="chain-native">${hasAny?`<div>${totalNativeBal.toFixed(6)} ${c.sym}</div><div class="chain-usd-sm">$${totalNativeUsd.toFixed(2)}</div>`:'<span class="spin"></span>'}</div>
      </div>

function renderTxList(c,txs){
  if(!txs) return '<div class="loading-text">⟳ Fetching…</div>';
  if(!txs.length) return '<div class="empty-state">No transactions found</div>';

  const normal=[], contractCalls=[], contractExecs=[], failed=[];

  txs.forEach(tx=>{
    const txAddr=tx._acc||address;
    const {isFailed,hasInput,isOut,isContractExec}=classifyTx(tx,txAddr);
    if(isFailed){ failed.push(tx); return; }
    if(isContractExec){ contractExecs.push(tx); return; }
    if(hasInput && !isOut){ contractCalls.push(tx); return; }
    normal.push(tx);
  });

  function txRow(tx, type){
    const txAddr=tx._acc||address;
    const isIn = tx.to?.toLowerCase()===txAddr?.toLowerCase();
    const val = (parseFloat(tx.value||0)/1e18).toFixed(4);
    const method = decodeMethod(tx.input);
    const gas = tx.gasUsed ? `gas: ${parseInt(tx.gasUsed).toLocaleString()}` : '';
    let iconClass, icon, color;
    if(type==='fail'){ iconClass='tx-fail'; icon='✕'; color='#ff6b6b'; }
    else if(type==='exec'){ iconClass='tx-exec'; icon='⚙'; color='#a78bfa'; }
    else if(type==='call'){ iconClass='tx-call'; icon='←'; color='var(--accent)'; }
    else { iconClass=isIn?'tx-in':'tx-out'; icon=isIn?'↓':'↑'; color=isIn?'var(--accent3)':'var(--accent2)'; }
    return`<div class="tx-row">
      <div class="tx-icon ${iconClass}">${icon}</div>
      <div class="tx-info">
        <div class="tx-hash" onclick="window.open('${c.explorerUrl}/tx/${tx.hash}')">${(tx.hash||'').slice(0,20)}…</div>
        <div class="tx-desc">${isIn?'From':'To'}: ${(isIn?(tx.from||''):(tx.to||'')).slice(0,14)}…</div>
        ${method?`<span class="tx-method ${type==='fail'?'fail':type==='exec'?'exec':''}">${type==='fail'?'❌ FAILED · ':''} ${method}</span>`:''}
        <div class="tx-time">${timeAgo(tx.timeStamp)} ${gas?'· <span class="gas-info">'+gas+'</span>':''}</div>
      </div>
      <div class="tx-val" style="color:${color}">${isIn?'+':'-'}${val} ${c.sym}</div>
    </div>`;
  }

  let html='';

  if(normal.length){
    html+=`<div class="activity-section">
      <div class="activity-header">↕ Transfers <span class="activity-count">${normal.length}</span></div>
      ${normal.slice(0,10).map(tx=>txRow(tx,'normal')).join('')}
    </div>`;
  }

  if(contractExecs.length){
    html+=`<div class="activity-section">
      <div class="activity-header">⚙ Contract Executes <span class="activity-count exec">${contractExecs.length}</span></div>
      ${contractExecs.slice(0,10).map(tx=>txRow(tx,'exec')).join('')}
    </div>`;
  }

  if(contractCalls.length){
    html+=`<div class="activity-section">
      <div class="activity-header">← Contract Calls Received <span class="activity-count">${contractCalls.length}</span></div>
      ${contractCalls.slice(0,10).map(tx=>txRow(tx,'call')).join('')}
    </div>`;
  }

  if(failed.length){
    html+=`<div class="activity-section">
      <div class="activity-header">❌ Failed Transactions <span class="activity-count fail">${failed.length}</span></div>
      ${failed.slice(0,10).map(tx=>txRow(tx,'fail')).join('')}
    </div>`;
  }

  return html || '<div class="empty-state">No transactions found</div>';
}

// ── LOAD DATA ──
async function loadAll(){
  if(!selectedAccounts.length)return;
  portfolio={};renderDash();
  try{
    const r=await fetch('https://api.coingecko.com/api/v3/simple/price?ids=ethereum,binancecoin,matic-network&vs_currencies=usd');
    const d=await r.json();
    prices={ethereum:d.ethereum?.usd||2100,binancecoin:d.binancecoin?.usd||600,'matic-network':d['matic-network']?.usd||0.5};
  }catch{ prices={ethereum:2100,binancecoin:600,'matic-network':0.5}; }
  // Scan all selected accounts across all chains
  const tasks=[];
  CHAINS.forEach(c=>selectedAccounts.forEach(acc=>tasks.push(scanChain(c,acc))));
  await Promise.all(tasks);
  updateTotal();
}

async function scanChain(c, acc){
  const key=`${c.id}__${acc}`;
  try{
    const rr=await fetch(c.rpc,{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({jsonrpc:'2.0',method:'eth_getBalance',params:[acc,'latest'],id:1})});
    const rd=await rr.json();
    const nativeBal=parseInt(rd.result||'0x0',16)/1e18;
    const nativeUsd=nativeBal*(prices[c.cg]||0);
    const[tokens,nfts,txs]=await Promise.all([fetchTokens(c,acc),fetchNFTs(c,acc),fetchTxs(c,acc)]);
    await priceTokens(tokens);
    portfolio[key]={nativeBal,nativeUsd,tokens,nfts,txs,acc,chain:c.id};
    updateTotal();
    if(document.getElementById('tabContent'))renderTabContent();
  }catch{
    portfolio[key]={nativeBal:0,nativeUsd:0,tokens:[],nfts:[],txs:[],acc,chain:c.id};
  }
}

async function fetchTokens(c, acc){
  try{
    const r=await fetch(`${c.explorer}?module=account&action=tokenlist&address=${acc}&apikey=${KEY}`);
    const d=await r.json();
    return d.status==='1'?(d.result||[]):[];
  }catch{return[];}
}

async function fetchNFTs(c, acc){
  try{
    const r=await fetch(`${c.explorer}?module=account&action=tokennfttx&address=${acc}&page=1&offset=50&sort=desc&apikey=${KEY}`);
    const d=await r.json();
    if(d.status!=='1')return[];
    const seen=new Set();
    return(d.result||[]).filter(n=>{const k=`${n.contractAddress}_${n.tokenID}`;if(seen.has(k))return false;seen.add(k);return true;});
  }catch{return[];}
}

async function fetchTxs(c, acc){
  try{
    const r=await fetch(`${c.explorer}?module=account&action=txlist&address=${acc}&page=1&offset=50&sort=desc&apikey=${KEY}`);
    const d=await r.json();
    return d.status==='1'?(d.result||[]):[];
  }catch{return[];}
}

function classifyTx(tx, addr){
  const isFailed = tx.isError === '1';
  const hasInput = tx.input && tx.input !== '0x' && tx.input.length > 2;
  const isOut = tx.from?.toLowerCase() === addr?.toLowerCase();
  const isContractExec = isOut && hasInput; // you called a contract
  const isContractCall = !isOut && hasInput && tx.to?.toLowerCase() === addr?.toLowerCase(); // contract called you (rare via txlist)
  return { isFailed, hasInput, isOut, isContractExec, isContractCall };
}

function decodeMethod(input){
  if(!input || input === '0x') return null;
  const sig = input.slice(0,10);
  const known = {
    '0xa9059cbb':'transfer()','0x23b872dd':'transferFrom()','0x095ea7b3':'approve()',
    '0x40c10f19':'mint()','0x42842e0e':'safeTransferFrom()','0xa22cb465':'setApprovalForAll()',
    '0x1249c58b':'mint()','0x6a627842':'mint(address)','0x38ed1739':'swapExactTokens()',
    '0x7ff36ab5':'swapExactETHForTokens()','0x18cbafe5':'swapExactTokensForETH()',
    '0xfb3bdb41':'swapETHForExactTokens()','0x5c11d795':'swapExactTokensForTokensSupportingFee()',
    '0xe8e33700':'addLiquidity()','0xf305d719':'addLiquidityETH()','0xbaa2abde':'removeLiquidity()',
    '0x2e1a7d4d':'withdraw()','0xd0e30db0':'deposit()','0x3593564c':'execute() [Uniswap]',
    '0x12aa3caf':'fillOrder() [1inch]','0xac9650d8':'multicall()','0x5ae401dc':'multicall() [Uni v3]',
    '0x04e45aaf':'exactInputSingle()','0xb858183f':'exactInput()','0x414bf389':'exactInputSingle() [v3]',
  };
  return known[sig] || sig;
}

async function priceTokens(tokens){
  if(!tokens?.length)return;
  const contracts=tokens.slice(0,50).map(t=>t.contractAddress?.toLowerCase()).filter(Boolean);
  if(!contracts.length)return;
  try{
    const r=await fetch(`https://api.coingecko.com/api/v3/simple/token_price/ethereum?contract_addresses=${contracts.join(',')}&vs_currencies=usd`);
    const data=await r.json();
    tokens.forEach(t=>{
      const addr=t.contractAddress?.toLowerCase();
      const price=data[addr]?.usd||0;
      const bal=parseFloat(t.balance||0)/Math.pow(10,parseInt(t.decimals||18));
      t.usdVal=bal*price;
    });
  }catch{tokens.forEach(t=>{t.usdVal=0;});}
}

function updateTotal(){
  let total=0;
  Object.values(portfolio).forEach(p=>{
    total+=p.nativeUsd||0;
    (p.tokens||[]).forEach(t=>{total+=parseFloat(t.usdVal||0);});
  });
  const el=document.getElementById('grandTotal');
  if(el)el.textContent='$'+total.toFixed(2);
}

function fmtBal(raw,decimals){
  const d=parseInt(decimals||18);
  const v=parseFloat(raw||0)/Math.pow(10,d);
  if(v===0)return'0';
  if(v<0.0001)return v.toExponential(2);
  if(v<1)return v.toFixed(6);
  if(v<1000)return v.toFixed(4);
  return v.toLocaleString(undefined,{maximumFractionDigits:2});
}

function timeAgo(ts){
  if(!ts)return'';
  const diff=Math.floor(Date.now()/1000)-parseInt(ts);
  if(diff<60)return diff+'s ago';
  if(diff<3600)return Math.floor(diff/60)+'m ago';
  if(diff<86400)return Math.floor(diff/3600)+'h ago';
  return Math.floor(diff/86400)+'d ago';
}

if(typeof window.ethereum!=='undefined'){
  window.ethereum.on('accountsChanged',accs=>{
    if(!accs?.length)disconnect();
    else{address=accs[0].toLowerCase();render();loadAll();}
  });
}

let pc=0;
function boot(){
  if(typeof window.ethereum!=='undefined'||pc>=20)render();
  else{pc++;setTimeout(boot,150);}
}
boot();
</script>
